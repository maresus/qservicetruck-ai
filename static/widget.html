<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q-Service Truck — AI asistent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,43,110,0.72) 0%, rgba(0,26,78,0.55) 100%),
        url('/static/truck.jpg') center center / cover no-repeat;
      background-attachment: fixed;
      position: relative;
      padding: 60px 48px;
    }
    .page-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }
    .logo-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .logo-header img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
    }
    h1 {
      color: #ffffff;
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tagline {
      color: #7DC242;
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .page-content p {
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      margin: 0 0 12px;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: #7DC242;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="page-content">
    <div class="logo-header">
      <img src="/static/logo.png" alt="Q-Service Truck">
      <div>
        <h1>AI asistent</h1>
        <p class="tagline">Največja mreža servisov za gospodarska vozila</p>
      </div>
    </div>
    <p>Poiščite najbližjo delavnico, izveste več o storitvah ali se pridružite mreži Q-Service Truck.</p>
    <span class="badge">400+ delavnic · 15 držav · 24/7</span>
  </div>
  <script src="/static/widget.js?v=3"></script>
</body>
</html>
